function MapGrid({ getCellState, stageColor, onCellClick, selfMode }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <div style={{ minWidth: 270 }}>
        <div style={{ display: "grid", gridTemplateColumns: "24px repeat(5, 1fr)", gap: "3px", marginBottom: "3px" }}>
          <div style={{ fontSize: "8px", color: "#B0A090", writingMode: "vertical-rl", display: "flex", alignItems: "flex-end" }}>空間相↓</div>
          {COLS.map(c => (
            <div key={c} style={{ textAlign: "center" }}>
              <div style={{ fontSize: "13px", color: "#5A4A38" }}>{c}</div>
              <div style={{ fontSize: "8px", color: "#B0A090" }}>{COL_SUB[c]}</div>
            </div>
          ))}
        </div>
        {ROWS.map(row => (
          <div key={row} style={{ display: "grid", gridTemplateColumns: "24px repeat(5, 1fr)", gap: "3px", marginBottom: "3px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", fontSize: "13px", color: "#7A6A58" }}>{row}</div>
            {COLS.map(col => {
              const key = `${row}×${col}`;
              const state = getCellState(key);
              const name = CELL_NAMES[key];
              let bg, bdr, tc;
              if (selfMode) {
                if (state === "selected") { bg = "#C8956C28"; bdr = "2px solid #C8956C"; tc = "#8A5020"; }
                else { bg = "#F0EDE8"; bdr = "1px solid #DDD8D0"; tc = "#C8C0B8"; }
              } else {
                if (state === "new")  { bg = stageColor + "35"; bdr = `2.5px solid ${stageColor}`; tc = stageColor; }
                else if (state === "prev") { bg = "#DDD6CA", bdr = "1.5px solid #BEB6AA", tc = "#5A4A38"; }
                else { bg = "#F5F3F0"; bdr = "1px solid #E8E4DE"; tc = "#D8D2CA"; }
              }
              return (
                <div key={key} onClick={() => onCellClick?.(key)} style={{
                  aspectRatio: "1", background: bg, border: bdr, borderRadius: "5px",
                  display: "flex", flexDirection: "column", alignItems: "center",
                  justifyContent: "center", transition: "all 0.25s", position: "relative",
                  minHeight: 42, cursor: selfMode ? "pointer" : "default",
                }}>
                  {state === "new" && !selfMode && (
                    <div style={{ position: "absolute", top: 2, right: 2, width: 5, height: 5, borderRadius: "50%", background: stageColor, animation: "pulse 1.4s infinite" }} />
                  )}
                  <div style={{ fontSize: "16px", color: tc, lineHeight: 1 }}>{name}</div>
                  {(state === "prev" || state === "new") && !selfMode && (
                    <div style={{ fontSize: "5px", color: tc + "90", marginTop: 1 }}>{key}</div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
        <div style={{ textAlign: "right", fontSize: "8px", color: "#B0A090", marginTop: "2px" }}>時間相 →</div>
      </div>
    </div>
  );
}

            {/* キャッチ */}
            <div style={{ padding: "28px 20px 22px", background: "#FFFFFF", borderBottom: "1px solid #EEE9E0" }}>
              <div style={{ fontSize: "9px", letterSpacing: "0.3em", color: "#9A8A70", marginBottom: "12px" }}>FRAMEWORK</div>
              <div style={{ fontSize: "26px", lineHeight: "1.4", color: "#1A1208", marginBottom: "12px" }}>
                広福観
              </div>
              <div style={{ fontSize: "14px", color: "#3A2A18", lineHeight: "1.8", marginBottom: "12px" }}>
                幸福を「一種類のもの」として捉えない。
              </div>
              <div style={{ fontSize: "13px", color: "#7A6A58", lineHeight: "1.9" }}>
                人間の幸福には、複数の次元がある。自分だけの喜びも、誰かへの贈与も、共同体の栄光も、永続する使命感も——すべて「幸福」だが、その種類はまるで違う。広福観は、幸福を縦軸（誰との幸福か）と横軸（どの時間軸の幸福か）で捉え、25マスの地図として可視化するフレームワークだ。
              </div>
            </div>

            {/* 2軸の説明 */}
            <div style={{ padding: "20px 20px 4px" }}>
              <div style={{ fontSize: "8px", letterSpacing: "0.28em", color: "#9A8A70", marginBottom: "14px" }}>2つの軸</div>

              <div style={{ marginBottom: "12px", padding: "14px 16px", background: "#F8F4EE", borderRadius: "8px" }}>
                <div style={{ fontSize: "11px", letterSpacing: "0.1em", color: "#5A4A38", marginBottom: "8px" }}>空間相 ── 誰との幸福か</div>
                <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "8px" }}>
                  {[["自", "自己充足"], ["他", "他者との関わり"], ["共", "共同体"], ["合", "全体との一体"], ["理", "意味・真理"]].map(([k, v]) => (
                    <div key={k} style={{ padding: "3px 10px", background: "#FFFFFF", border: "1px solid #D8D0C4", borderRadius: "20px", fontSize: "11px", color: "#5A4A38" }}>
                      <span style={{ fontWeight: "bold" }}>{k}</span>　{v}
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: "11px", color: "#8A7A68", lineHeight: "1.8" }}>
                  「自」の幸福だけが幸福ではない。他者・共同体・全体・理へと広がるにつれ、幸福の射程は伸びていく。
                </div>
              </div>

              <div style={{ marginBottom: "16px", padding: "14px 16px", background: "#F4F6F8", borderRadius: "8px" }}>
                <div style={{ fontSize: "11px", letterSpacing: "0.1em", color: "#5A4A38", marginBottom: "8px" }}>時間相 ── どの時間軸の幸福か</div>
                <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "8px" }}>
                  {[["瞬", "刹那"], ["進", "変化"], ["頂", "累積"], ["回", "循環"], ["久", "永遠"]].map(([k, v]) => (
                    <div key={k} style={{ padding: "3px 10px", background: "#FFFFFF", border: "1px solid #C8D0D8", borderRadius: "20px", fontSize: "11px", color: "#5A4A38" }}>
                      <span style={{ fontWeight: "bold" }}>{k}</span>　{v}
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: "11px", color: "#8A7A68", lineHeight: "1.8" }}>
                  今この瞬間の快楽も、長く続く使命感も、どちらも幸福だ。広福観は時間の深さでも幸福を測る。
                </div>
              </div>
            </div>

            {/* 25 CELLS MAP */}
            <div style={{ padding: "20px 20px 16px" }}>
              <div style={{ fontSize: "8px", letterSpacing: "0.28em", color: "#9A8A70", marginBottom: "12px" }}>25 CELLS MAP</div>
              <div style={{ fontSize: "13px", color: "#4A3A28", lineHeight: "1.9", marginBottom: "16px" }}>
                ただ、フレームワークの説明は容易ではない。構造を客観的に一気に理解しようとすると、相当なエネルギーが要る。人はむしろ、経験の積み重ね——つまり物語——を通じて、全体の像を漸進的に掴んでいくものだ。ここでは、ある会社員の人生を描いた短い小説を通じて、このフレームを体感してもらいたい。
              </div>

              {/* 地図画像 */}
              <div style={{ borderRadius: "10px", overflow: "hidden", border: "1px solid #E0D8CC", marginBottom: "8px" }}>
                <img src={MAP_IMAGE} alt="広福観マップ" style={{ width: "100%", display: "block" }} />
              </div>
              <div style={{ fontSize: "10px", color: "#A89880", textAlign: "right", marginBottom: "20px" }}>
                © Kuniaki Matsumura 2004–2025
              </div>

              <div style={{ padding: "14px 16px", background: "#F8F4EE", borderRadius: "8px", marginBottom: "24px" }}>
                <div style={{ fontSize: "12px", color: "#5A4A38", lineHeight: "1.9" }}>
                  各セルの意味は、読み進めるうちに自然とわかってくる。まず物語を読んでほしい。
                </div>
              </div>
            </div>

            {/* CTA */}
            <div style={{ padding: "0 20px 40px" }}>
              <button onClick={() => go(0)} style={{ width: "100%", padding: "15px", background: "#3A2A18", border: "none", borderRadius: "8px", color: "#FFFFFF", fontSize: "15px", fontFamily: "inherit", letterSpacing: "0.08em", cursor: "pointer" }}>
                物語を読む →
              </button>
            </div>
          </div>
        )}

        {/* ── SELF MODE ── */}
        {mode === "self" && (
          <div style={{ padding: "32px 20px 48px" }}>
            <div style={{ fontSize: "9px", letterSpacing: "0.28em", color: "#9A8A70", marginBottom: "20px" }}>YOUR HAPPINESS MAP</div>
            <div style={{ fontSize: "20px", lineHeight: "1.65", color: "#1A1208", marginBottom: "20px" }}>
              さて、あなた自身の幸福の広がりについても、考えてみませんか？
            </div>
            <div style={{ fontSize: "14px", color: "#5A4A48", lineHeight: "2.1", marginBottom: "36px" }}>
              フクダ・ヒロシと似たような変遷はあったでしょうか。<br /><br />
              あなたの幸福をこの2軸25マスの地図で可視化するツールをご用意しました。設問の答えを選んでいく3分のクイズで、あなたの幸福特性が浮かび上がります。
            </div>
            <a href="https://kuniakimat.github.io/-happiness-map/index.html" target="_blank" rel="noopener noreferrer" style={{ display: "block", padding: "16px", background: C, borderRadius: "8px", color: "#FFFFFF", fontSize: "16px", fontFamily: "inherit", letterSpacing: "0.05em", textAlign: "center", textDecoration: "none" }}>
              こちらからどうぞ →
            </a>
          </div>
        )}

        {/* ── STORY MODE ── */}
        {mode === "story" && (
          <div>
            {/* Stage header */}
            <div style={{ padding: "20px 20px 0", background: "#FFFFFF" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px" }}>
                <div style={{ width: "22px", height: "22px", borderRadius: "50%", background: stage.color + "25", border: `1px solid ${stage.color}60`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "9px", color: stage.color, flexShrink: 0 }}>
                  {active + 1}
                </div>
                <div style={{ fontSize: "11px", color: stage.color, letterSpacing: "0.08em" }}>{stage.age}　{stage.title}</div>
              </div>
              {/* Key line — 大きく、一行で引っかかる */}
              <div style={{ fontSize: "22px", lineHeight: "1.55", color: "#1A1208", letterSpacing: "0.02em", fontWeight: "normal", paddingBottom: "18px", borderBottom: `2px solid ${stage.color}30` }}>
                {stage.keyLine}
              </div>
            </div>

            {/* Prose */}
            <div style={{ padding: "16px 20px 10px", background: "#FFFFFF" }}>
              <div style={{ fontSize: "14px", lineHeight: "2.2", color: "#4A3A28", whiteSpace: "pre-line", letterSpacing: "0.02em" }}>
                {stage.prose}
              </div>
            </div>

            {/* Insight */}
            <div style={{ margin: "8px 20px 16px", padding: "12px 15px", borderLeft: `3px solid ${stage.color}`, background: stage.color + "10", borderRadius: "0 6px 6px 0" }}>
              <div style={{ fontSize: "7px", letterSpacing: "0.3em", color: stage.color, marginBottom: "5px" }}>INSIGHT</div>
              <div style={{ fontSize: "12px", color: "#5A4A38", lineHeight: "1.8", fontStyle: "italic" }}>{stage.insight}</div>
            </div>

            {/* Map */}
            <div style={{ padding: "14px 20px 16px", borderTop: "1px solid #EEE9E0", background: "#FFFFFF" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
                <div style={{ display: "flex", alignItems: "baseline", gap: "8px" }}>
                  <div style={{ fontSize: "8px", letterSpacing: "0.22em", color: "#9A8A70" }}>HAPPINESS MAP</div>
                  <div style={{ fontSize: "9px", color: stage.color }}>{total}<span style={{ fontSize: "7px", color: "#B0A090" }}>/25</span></div>
                </div>
                <div style={{ display: "flex", gap: "10px" }}>
                  {[[stage.color, "今回"], ["#D0C8BC", "既開"]].map(([c, l]) => (
                    <div key={l} style={{ display: "flex", alignItems: "center", gap: "3px" }}>
                      <div style={{ width: "7px", height: "7px", borderRadius: "1px", background: c }} />
                      <span style={{ fontSize: "7px", color: "#9A8A70" }}>{l}</span>
                    </div>
                  ))}
                </div>
              </div>

              <MapGrid getCellState={getCellStateStory} stageColor={stage.color} />

              <div style={{ marginTop: "10px", height: "2px", background: "#E8E4DC", borderRadius: "1px" }}>
                <div style={{ height: "100%", width: `${(total / 25) * 100}%`, background: stage.color, borderRadius: "1px", transition: "width 0.5s" }} />
              </div>

              {/* A: 今回開いたセル＋定義文 */}
              <div style={{ marginTop: "14px" }}>
                <div style={{ fontSize: "7px", letterSpacing: "0.25em", color: "#A89880", marginBottom: "9px" }}>このStageで開いたセル</div>
                {stage.newCells.map(cell => (
                  <div key={cell} style={{ display: "flex", gap: "10px", alignItems: "flex-start", padding: "6px 0", borderBottom: "1px solid #F0EDE8" }}>
                    <div style={{ minWidth: 28, fontSize: "18px", color: stage.color, lineHeight: 1 }}>{CELL_NAMES[cell]}</div>
                    <div>
                      <div style={{ fontSize: "10px", color: stage.color, letterSpacing: "0.05em" }}>{cell}</div>
                      <div style={{ fontSize: "11px", color: "#7A6A58", marginTop: "2px" }}>{CELL_DEFS[cell]}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Nav */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 20px 32px", borderTop: "1px solid #E8E4DC" }}>
              <button onClick={() => go(Math.max(0, active - 1))} disabled={active === 0} style={{ background: "#FFFFFF", border: "1px solid #D8D0C4", color: "#8A7A68", padding: "8px 18px", borderRadius: "4px", cursor: active === 0 ? "default" : "pointer", opacity: active === 0 ? 0.3 : 1, fontFamily: "inherit", fontSize: "13px" }}>
                {"\u2190"} 前
              </button>
              <div style={{ display: "flex", gap: "4px", alignItems: "center" }}>
                {STAGES.map((s, i) => (
                  <div key={i} onClick={() => go(i)} style={{ width: i === active ? 14 : 5, height: 5, borderRadius: 3, background: i <= active ? s.color : "#D8D0C4", cursor: "pointer", transition: "all 0.3s" }} />
                ))}
              </div>
              {active < STAGES.length - 1 ? (
                <button onClick={() => go(active + 1)} style={{ background: stage.color, border: "none", color: "#FFFFFF", padding: "8px 18px", borderRadius: "4px", fontFamily: "inherit", fontSize: "13px", cursor: "pointer" }}>
                  次 {"\u2192"}
                </button>
              ) : (
                <button onClick={goSelf} style={{ background: C, border: "none", color: "#FFFFFF", padding: "8px 14px", borderRadius: "4px", fontFamily: "inherit", fontSize: "12px", cursor: "pointer" }}>
                  今の自分は？ {"\u2192"}
                </button>
              )}
            </div>
          </div>
        )}
      </div>

      <style>{`
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.8)}}
        *{box-sizing:border-box;color-scheme:light}
        ::-webkit-scrollbar{display:none}
        :root{color-scheme:light}
      `}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
