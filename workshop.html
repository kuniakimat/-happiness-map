<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福の地図 — ワークショップギャラリー</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#111;--paper:#fafaf8;--muted:#888;--line:#e8e5df;--accent:#c8a96e;--k0:#e8c4a0;--k1:#a8c4b8;--k2:#b4a8c8;--k3:#c4b8a0;--k4:#a8b4c4;}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.7}
header{padding:32px 40px 24px;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;}
.header-brand{font-family:'Shippori Mincho',serif;font-size:20px;letter-spacing:.04em;color:var(--ink)}
.header-brand span{font-size:12px;color:var(--muted);font-family:'Noto Sans JP',sans-serif;margin-left:12px;font-weight:300}
.ws-badge{background:var(--ink);color:#fff;font-size:13px;padding:4px 14px;border-radius:2px;font-family:'Shippori Mincho',serif;letter-spacing:.06em;}
#entry{max-width:480px;margin:80px auto;padding:0 24px;text-align:center;}
#entry h2{font-family:'Shippori Mincho',serif;font-size:24px;margin-bottom:12px;font-weight:500}
#entry p{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.8}
.entry-row{display:flex;gap:8px}
.entry-row input{flex:1;padding:12px 16px;border:1px solid var(--line);font-size:15px;font-family:'Shippori Mincho',serif;letter-spacing:.06em;background:var(--paper);outline:none;}
.entry-row input:focus{border-color:var(--ink)}
.entry-row button{padding:12px 20px;background:var(--ink);color:#fff;border:none;font-size:14px;cursor:pointer;white-space:nowrap;}
.entry-row button:hover{background:#333}
#gallery{display:none;padding:0 40px 60px}
.summary{display:flex;gap:32px;padding:24px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center;}
.summary-stat{text-align:center}
.summary-stat .num{font-family:'Shippori Mincho',serif;font-size:36px;font-weight:700;line-height:1}
.summary-stat .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-top:32px}
.tab{padding:10px 24px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:color .2s,border-color .2s;}
.tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.tab:hover{color:var(--ink)}
.tab-content{display:none;padding-top:28px}
.tab-content.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.card{border:1px solid var(--line);padding:20px;cursor:pointer;transition:border-color .2s,transform .2s;background:#fff;}
.card:hover{border-color:var(--ink);transform:translateY(-2px)}
.card-name{font-family:'Shippori Mincho',serif;font-size:16px;margin-bottom:6px}
.card-type{font-size:11px;color:var(--muted);margin-bottom:12px}
.card-mini-map{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-bottom:10px}
.card-mini-cell{aspect-ratio:1;border-radius:1px;background:var(--line);}
.card-mini-cell.lit{background:var(--accent);opacity:.85}
.card-core{font-size:11px;color:var(--ink);font-weight:500}
.team-section{display:flex;gap:40px;flex-wrap:wrap}
.team-map-wrap{flex:0 0 auto}
.team-map-title{font-family:'Shippori Mincho',serif;font-size:14px;margin-bottom:12px;color:var(--muted)}
.team-grid{display:grid;grid-template-columns:repeat(5,48px);grid-template-rows:repeat(5,48px);gap:3px}
.team-cell{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:500;position:relative;cursor:default;}
.team-cell:hover .cell-tooltip{display:block}
.cell-tooltip{display:none;position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:10px;padding:4px 8px;white-space:nowrap;border-radius:2px;z-index:10;pointer-events:none;}
.scatter-wrap{flex:1;min-width:280px}
.scatter-title{font-family:'Shippori Mincho',serif;font-size:14px;margin-bottom:12px;color:var(--muted)}
.scatter-grid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);width:280px;height:280px;border:1px solid var(--line);}
.scatter-col-label{font-size:9px;color:var(--muted);text-align:center}
.scatter-row-label{font-size:9px;color:var(--muted);writing-mode:vertical-lr;transform:rotate(180deg)}
.scatter-cell{border:0.5px solid var(--line);display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:2px;padding:2px;}
.scatter-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:500;cursor:default;position:relative;}
.scatter-dot:hover::after{content:attr(data-name);position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:10px;padding:3px 8px;white-space:nowrap;border-radius:2px;z-index:10;}
.type-dist{display:flex;flex-direction:column;gap:8px;max-width:400px}
.type-bar-row{display:flex;align-items:center;gap:10px}
.type-bar-name{font-size:12px;width:100px;flex-shrink:0}
.type-bar-track{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.type-bar-fill{height:100%;background:var(--ink);border-radius:4px;transition:width .8s ease}
.type-bar-count{font-size:11px;color:var(--muted);width:24px;text-align:right}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex}
.modal{background:#fff;max-width:480px;width:90%;max-height:85vh;overflow-y:auto;padding:32px;position:relative;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.modal-name{font-family:'Shippori Mincho',serif;font-size:22px;margin-bottom:4px}
.modal-type{font-size:13px;color:var(--muted);margin-bottom:20px}
.modal-map{display:grid;grid-template-columns:repeat(5,44px);grid-template-rows:repeat(5,44px);gap:3px;margin-bottom:20px}
.modal-cell{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
.modal-stats{display:flex;gap:20px;flex-wrap:wrap}
.modal-stat .lbl{font-size:11px;color:var(--muted)}
.modal-stat .val{font-size:16px;font-family:'Shippori Mincho',serif}
#loading{padding:60px;text-align:center;color:var(--muted);font-size:13px}
#error-msg{padding:40px;text-align:center;color:#c44;font-size:13px;display:none}
@media(max-width:600px){header{padding:20px}#gallery{padding:0 16px 40px}.team-section{flex-direction:column}.scatter-grid{width:240px;height:240px}}
</style>
</head>
<body>
<header>
  <div class="header-brand">幸福の地図<span>Workshop Gallery</span></div>
  <div id="ws-badge-area"></div>
</header>
<div id="entry">
  <h2>ワークショップIDを入力</h2>
  <p>ファシリテーターから共有されたIDを入力してください</p>
  <div class="entry-row">
    <input type="text" id="ws-id" placeholder="例：AP0408" maxlength="12" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
    <button onclick="loadGallery()">表示する</button>
  </div>
</div>
<div id="gallery">
  <div id="loading">データを読み込み中…</div>
  <div id="error-msg"></div>
  <div class="summary" id="summary" style="display:none">
    <div class="summary-stat"><div class="num" id="s-count">0</div><div class="lbl">参加者</div></div>
    <div class="summary-stat"><div class="num" id="s-avg-lit">0</div><div class="lbl">平均活性マス</div></div>
    <div class="summary-stat"><div class="num" id="s-top-type">—</div><div class="lbl">最多タイプ</div></div>
  </div>
  <div class="tabs" id="tabs" style="display:none">
    <div class="tab active" onclick="switchTab('members')">参加者一覧</div>
    <div class="tab" onclick="switchTab('team')">チームマップ</div>
    <div class="tab" onclick="switchTab('dist')">タイプ分布</div>
  </div>
  <div class="tab-content active" id="tab-members"><div class="cards" id="cards"></div></div>
  <div class="tab-content" id="tab-team">
    <div class="team-section">
      <div class="team-map-wrap">
        <div class="team-map-title">チーム平均幸福マップ</div>
        <div class="team-grid" id="team-grid"></div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted)">濃いほどチームで活性化しているマス</div>
      </div>
      <div class="scatter-wrap">
        <div class="scatter-title">コア幸福の分布</div>
        <div style="display:flex;gap:4px;margin-bottom:4px;padding-left:24px">
          <div style="flex:1;display:grid;grid-template-columns:repeat(5,1fr)">
            <div class="scatter-col-label">瞬</div><div class="scatter-col-label">進</div><div class="scatter-col-label">頂</div><div class="scatter-col-label">回</div><div class="scatter-col-label">久</div>
          </div>
        </div>
        <div style="display:flex;gap:4px">
          <div style="display:grid;grid-template-rows:repeat(5,1fr);width:20px;height:280px">
            <div class="scatter-row-label">理</div><div class="scatter-row-label">共</div><div class="scatter-row-label">他</div><div class="scatter-row-label">合</div><div class="scatter-row-label">自</div>
          </div>
          <div class="scatter-grid" id="scatter-grid"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="tab-content" id="tab-dist"><div class="type-dist" id="type-dist"></div></div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">×</button>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-type" id="m-type"></div>
    <div class="modal-map" id="m-map"></div>
    <div class="modal-stats" id="m-stats"></div>
  </div>
</div>
<script>
const GAS='https://script.google.com/macros/s/AKfycbyd1pBIMGkA8FaI9o_hNknrXGGJxCBpa1BuZq4XuWY3hU3rrqXEh8G-tOukDZ-PA101/exec';
const KL=['自','他','合','共','理'];
const JL=['瞬','進','頂','回','久'];
const KANJI=[['快','得','誇','保','足'],['触','与','結','恩','慈'],['溶','創','恍','巡','愛'],['祭','闘','栄','役','和'],['戯','学','顕','整','悟']];
const K_COLORS=['#c89878','#78a898','#9888b8','#a8987c','#8898b4'];
let _data=[],_wsId='';
(function(){const p=new URLSearchParams(location.search);const id=p.get('id');if(id){document.getElementById('ws-id').value=id.toUpperCase();loadGallery();}})();
function loadGallery(){
  const id=document.getElementById('ws-id').value.trim().toUpperCase();
  if(!id){alert('IDを入力してください');return;}
  _wsId=id;
  document.getElementById('entry').style.display='none';
  document.getElementById('gallery').style.display='block';
  document.getElementById('loading').style.display='block';
  document.getElementById('summary').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('ws-badge-area').innerHTML='<div class="ws-badge">'+id+'</div>';
  history.replaceState(null,'','?id='+id);
  fetch(GAS+'?action=gallery&workshopId='+encodeURIComponent(id))
    .then(r=>r.json())
    .then(data=>{_data=data;document.getElementById('loading').style.display='none';if(!data.length){showError('このIDの回答がまだありません。
診断を終えて「ワークショップIDを入力して共有」からIDを入力してください。');return;}renderAll();})
    .catch(()=>showError('データの取得に失敗しました。'));
}
function showError(msg){const el=document.getElementById('error-msg');el.style.display='block';el.innerHTML=msg.replace(/
/g,'<br>');}
function renderAll(){
  document.getElementById('summary').style.display='flex';document.getElementById('tabs').style.display='flex';
  const avgLit=Math.round(_data.reduce((s,d)=>s+(d.lit||0),0)/_data.length);
  const tc={};_data.forEach(d=>{tc[d.typeName]=(tc[d.typeName]||0)+1;});
  const top=Object.entries(tc).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  document.getElementById('s-count').textContent=_data.length;
  document.getElementById('s-avg-lit').textContent=avgLit;
  document.getElementById('s-top-type').textContent=top?top.replace(/型$/,''):'—';
  renderCards();renderTeamMap();renderScatter();renderTypeDist();
}
function renderCards(){
  const c=document.getElementById('cards');c.innerHTML='';
  _data.forEach(d=>{
    const card=document.createElement('div');card.className='card';card.onclick=()=>openModal(d);
    let mc='';for(let ki=0;ki<5;ki++)for(let ji=0;ji<5;ji++){const v=d.scores?d.scores[ki*5+ji]:0;mc+='<div class="card-mini-cell'+(v>=3?' lit':'')+'"></div>';}
    card.innerHTML='<div class="card-name">'+(d.name||'匿名')+'</div><div class="card-type">'+(d.typeName||'—')+'</div><div class="card-mini-map">'+mc+'</div><div class="card-core">コア：'+(d.coreCell||'—')+'</div>';
    c.appendChild(card);
  });
}
function renderTeamMap(){
  const sums=new Array(25).fill(0),counts=new Array(25).fill(0);
  _data.forEach(d=>{if(!d.scores)return;d.scores.forEach((v,i)=>{sums[i]+=v;counts[i]++;});});
  const avgs=sums.map((s,i)=>counts[i]?s/counts[i]:0),maxAvg=Math.max(...avgs);
  const grid=document.getElementById('team-grid');grid.innerHTML='';
  for(let ki=0;ki<5;ki++)for(let ji=0;ji<5;ji++){
    const v=avgs[ki*5+ji],cell=document.createElement('div');
    cell.className='team-cell';cell.style.background=K_COLORS[ki];cell.style.opacity=0.1+(maxAvg>0?v/maxAvg:0)*0.85;
    const tip=document.createElement('div');tip.className='cell-tooltip';tip.textContent=KL[ki]+'×'+JL[ji]+' '+v.toFixed(1);
    cell.appendChild(tip);grid.appendChild(cell);
  }
}
function renderScatter(){
  const grid=document.getElementById('scatter-grid');grid.innerHTML='';
  const cells=[];for(let ki=0;ki<5;ki++)for(let ji=0;ji<5;ji++){const c=document.createElement('div');c.className='scatter-cell';cells.push(c);grid.appendChild(c);}
  _data.forEach(d=>{
    if(!d.coreCell)return;
    const m=d.coreCell.match(/([自他合共理])x([瞬進頂回久])/);
    if(!m)return;
    const ki=KL.indexOf(m[1]),ji=JL.indexOf(m[2]);
    if(ki<0||ji<0)return;
    const dot=document.createElement('div');dot.className='scatter-dot';dot.style.background=K_COLORS[ki];
    dot.setAttribute('data-name',d.name||'匿名');dot.textContent=(d.name||'?').charAt(0);
    cells[ki*5+ji].appendChild(dot);
  });
}
function renderTypeDist(){
  const c=document.getElementById('type-dist');c.innerHTML='';
  const tc={};_data.forEach(d=>{const t=d.typeName||'不明';tc[t]=(tc[t]||0)+1;});
  const max=Math.max(...Object.values(tc));
  Object.entries(tc).sort((a,b)=>b[1]-a[1]).forEach(([name,count])=>{
    c.innerHTML+='<div class="type-bar-row"><div class="type-bar-name">'+name+'</div><div class="type-bar-track"><div class="type-bar-fill" style="width:'+(max>0?count/max*100:0)+'%"></div></div><div class="type-bar-count">'+count+'</div></div>';
  });
}
function openModal(d){
  document.getElementById('m-name').textContent=d.name||'匿名';
  document.getElementById('m-type').textContent=(d.typeName||'—')+'  ／  活性マス：'+(d.lit||0)+'/25';
  const mapEl=document.getElementById('m-map');mapEl.innerHTML='';
  for(let ki=0;ki<5;ki++)for(let ji=0;ji<5;ji++){const v=d.scores?d.scores[ki*5+ji]:0,lit=v>=3;const cell=document.createElement('div');cell.className='modal-cell';cell.style.background=lit?K_COLORS[ki]:'#f0ede8';cell.style.color=lit?'#fff':'#ccc';cell.textContent=lit?KANJI[ki][ji]:'';mapEl.appendChild(cell);}
  document.getElementById('m-stats').innerHTML='<div class="modal-stat"><div class="lbl">コア幸福</div><div class="val">'+(d.coreCell||'—')+'</div></div><div class="modal-stat"><div class="lbl">K軸</div><div class="val">'+(d.domK||'—')+'</div></div><div class="modal-stat"><div class="lbl">J軸</div><div class="val">'+(d.domJ||'—')+'</div></div>';
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['members','team','dist'][i]===name);});
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}
</script>
</body>
</html>
